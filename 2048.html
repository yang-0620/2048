<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #faf8ef;
            touch-action: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .title {
            font-size: 60px;
            font-weight: bold;
            color: #8b8073;
            margin-bottom: 15px;
        }
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            gap: 8px;
        }
        .score-box {
            background-color: #c4b4a3;
            color: white;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
        }
        .grid-container {
            width: 100%;
            max-width: 320px;
            height: 320px;
            background-color: #d9cdbf;
            border-radius: 8px;
            padding: 10px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            /* 禁止触摸事件冒泡到body，防止页面滑动 */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .grid-cell {
            background-color: #ebe1d6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.15s ease;
            will-change: transform;
        }
        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.15s ease;
            /* 禁止图片拖动和浏览器默认行为，防止闪烁 */
            pointer-events: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            will-change: transform;
        }
        .grid-cell.new img {
            animation: appear 0.2s ease forwards;
        }
        .grid-cell.merged img {
            animation: pop 0.2s ease forwards;
        }
        @keyframes appear {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }
        .game-over p {
            font-size: 28px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }
        .restart-btn {
            background-color: #c4b4a3;
            color: white;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="title">2048</div>
    <div class="score-container">
        <div class="score-box">分数: <span id="score">0</span></div>
        <div class="score-box">最高分: <span id="highScore">0</span></div>
    </div>
    <div class="grid-container" id="gridContainer"></div>
    <button class="restart-btn" onclick="restartGame()">重新开始</button>

    <script>
        // 预加载所有奥特曼图片，解决闪烁问题
        const imagesToPreload = [
            'images/2.png',
            'images/4.png',
            'images/8.png',
            'images/16.png',
            'images/32.png',
            'images/64.png',
            'images/128.png',
            'images/256.png',
            'images/512.png',
            'images/1024.png',
            'images/2048.png'
        ];
        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        class Board {
            constructor(size) {
                this.size = size;
                this.grid = Array(size).fill().map(() => Array(size).fill(0));
            }
            getGrid() {
                return JSON.parse(JSON.stringify(this.grid));
            }
            setGrid(newGrid) {
                this.grid = newGrid;
            }
            addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 0) {
                            emptyCells.push({i, j});
                        }
                    }
                }
                if (emptyCells.length === 0) return;
                const {i, j} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                this.grid[i][j] = Math.random() < 0.9 ? 2 : 4;
                return {i, j};
            }
        }

        class Main {
            constructor(size) {
                this.size = size;
                this.board = new Board(size);
                this.score = 0;
                this.isMoving = false;
                this.lastMove = { moved: false, newTile: null };
                this.init();
            }
            init() {
                this.board.addRandomTile();
                this.board.addRandomTile();
            }
            move(direction) {
                if (this.isMoving) return {grid: this.board.getGrid(), moved: false};
                this.isMoving = true;

                const grid = this.board.getGrid();
                const newGrid = [];
                for (let i = 0; i < this.size; i++) {
                    newGrid.push([...grid[i]]);
                }
                let moved = false;
                let addScore = 0;

                if (direction === 3 || direction === 1) {
                    for (let i = 0; i < this.size; i++) {
                        let row = grid[i].filter(num => num !== 0);
                        if (direction === 3) {
                            for (let j = 0; j < row.length - 1; j++) {
                                if (row[j] === row[j + 1]) {
                                    row[j] *= 2;
                                    addScore += row[j];
                                    row[j + 1] = 0;
                                }
                            }
                        } else {
                            for (let j = row.length - 1; j > 0; j--) {
                                if (row[j] === row[j - 1]) {
                                    row[j] *= 2;
                                    addScore += row[j];
                                    row[j - 1] = 0;
                                }
                            }
                        }
                        row = row.filter(num => num !== 0);
                        while (row.length < this.size) {
                            direction === 1 ? row.unshift(0) : row.push(0);
                        }
                        for (let j = 0; j < this.size; j++) {
                            if (newGrid[i][j] !== row[j]) moved = true;
                            newGrid[i][j] = row[j];
                        }
                    }
                }

                if (direction === 0 || direction === 2) {
                    for (let j = 0; j < this.size; j++) {
                        let col = [];
                        for (let i = 0; i < this.size; i++) {
                            col.push(grid[i][j]);
                        }
                        if (direction === 0) {
                            for (let i = 0; i < col.length - 1; i++) {
                                if (col[i] === col[i + 1]) {
                                    col[i] *= 2;
                                    addScore += col[i];
                                    col[i + 1] = 0;
                                }
                            }
                        } else {
                            for (let i = col.length - 1; i > 0; i--) {
                                if (col[i] === col[i - 1]) {
                                    col[i] *= 2;
                                    addScore += col[i];
                                    col[i - 1] = 0;
                                }
                            }
                        }
                        col = col.filter(num => num !== 0);
                        while (col.length < this.size) {
                            direction === 2 ? col.unshift(0) : col.push(0);
                        }
                        for (let i = 0; i < this.size; i++) {
                            if (newGrid[i][j] !== col[i]) moved = true;
                            newGrid[i][j] = col[i];
                        }
                    }
                }

                let newTile = null;
                if (moved) {
                    this.board.setGrid(newGrid);
                    newTile = this.board.addRandomTile();
                    this.score += addScore;
                }

                setTimeout(() => {
                    this.isMoving = false;
                }, 150);

                this.lastMove = { moved, newTile };
                return {grid: this.board.getGrid(), moved, score: this.score, newTile};
            }

            isOver() {
                const grid = this.board.getGrid();
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (grid[i][j] === 0) return false;
                    }
                }
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size - 1; j++) {
                        if (grid[i][j] === grid[i][j + 1]) return false;
                    }
                }
                for (let j = 0; j < this.size; j++) {
                    for (let i = 0; i < this.size - 1; i++) {
                        if (grid[i][j] === grid[i + 1][j]) return false;
                    }
                }
                return true;
            }
        }

        let highScore = localStorage.getItem('2048_highScore') || 0;
        document.getElementById('highScore').textContent = highScore;

        const game = new Main(4);
        const gridContainer = document.getElementById('gridContainer');
        const scoreElement = document.getElementById('score');
        let touchStartX, touchStartY;

        function renderGrid() {
            const grid = game.board.getGrid();
            gridContainer.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'grid-cell';
                    const val = grid[i][j];
                    if (val > 0) {
                        const img = document.createElement('img');
                        img.src = `images/${val}.png`;
                        img.alt = val;
                        
                        if (game.lastMove.newTile && 
                            game.lastMove.newTile.i === i && 
                            game.lastMove.newTile.j === j) {
                            cellDiv.classList.add('new');
                        }
                        
                        cellDiv.appendChild(img);
                    }
                    gridContainer.appendChild(cellDiv);
                }
            }

            scoreElement.textContent = game.score;

            if (game.score > highScore) {
                highScore = game.score;
                localStorage.setItem('2048_highScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            if (game.isOver()) {
                showGameOver();
            }
        }

        function showGameOver() {
            const gameOverDiv = document.createElement('div');
            gameOverDiv.className = 'game-over';
            gameOverDiv.innerHTML = `
                <p>游戏结束</p>
                <button class="restart-btn" onclick="restartGame()">重新开始</button>
            `;
            gridContainer.appendChild(gameOverDiv);
        }

        function restartGame() {
            game.board = new Board(4);
            game.score = 0;
            game.init();
            renderGrid();
        }

        document.addEventListener('keydown', (e) => {
            let dir;
            switch(e.key) {
                case 'ArrowUp': dir = 0; break;
                case 'ArrowRight': dir = 1; break;
                case 'ArrowDown': dir = 2; break;
                case 'ArrowLeft': dir = 3; break;
                default: return;
            }
            const res = game.move(dir);
            if (res.moved) {
                renderGrid();
            }
        });

        gridContainer.addEventListener('touchstart', (e) => {
            // 阻止事件冒泡，防止页面滑动
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        gridContainer.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const dx = endX - touchStartX;
            const dy = endY - touchStartY;

            let dir = null;
            if (Math.abs(dx) > Math.abs(dy)) {
                dir = dx > 30 ? 1 : dx < -30 ? 3 : null;
            } else {
                dir = dy > 30 ? 2 : dy < -30 ? 0 : null;
            }

            if (dir !== null) {
                const res = game.move(dir);
                if (res.moved) {
                    renderGrid();
                }
            }
            touchStartX = null;
            touchStartY = null;
        });

        renderGrid();
    </script>
</body>
</html>
