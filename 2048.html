<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #faf8ef;
            touch-action: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .title {
            font-size: 60px;
            font-weight: bold;
            color: #8b8073;
            margin-bottom: 15px;
        }
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            gap: 8px;
        }
        .score-box {
            background: #c4b4a3;
            color: #fff;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
        }
        .grid-container {
            width: 100%;
            max-width: 320px;
            height: 320px;
            background: #d9cdbf;
            border-radius: 8px;
            padding: 10px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            touch-action: none;
            user-select: none;
        }
        .grid-cell {
            background: #ebe1d6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-drag: none;
        }
        .grid-cell.new img {
            animation: appear 0.1s ease forwards;
        }
        @keyframes appear {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238,228,218,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }
        .game-over p {
            font-size: 28px;
            font-weight: bold;
            color: #776e65;
        }
        .restart-btn {
            background: #c4b4a3;
            color: #fff;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="title">2048</div>
    <div class="score-container">
        <div class="score-box">分数: <span id="score">0</span></div>
        <div class="score-box">最高分: <span id="highScore">0</span></div>
    </div>
    <div class="grid-container" id="gridContainer"></div>
    <button class="restart-btn" onclick="restartGame()">重新开始</button>

    <script>
        // 预加载图片
        const imgs = [
            'images/2.png','images/4.png','images/8.png','images/16.png',
            'images/32.png','images/64.png','images/128.png','images/256.png',
            'images/512.png','images/1024.png','images/2048.png'
        ];
        imgs.forEach(s=>{let i=new Image();i.src=s;});

        class Board {
            constructor(size) {
                this.size = size;
                this.grid = Array(size).fill().map(()=>Array(size).fill(0));
            }
            getGrid() { return JSON.parse(JSON.stringify(this.grid)); }
            setGrid(g) { this.grid = g; }
            addRandom() {
                let empty = [];
                for(let i=0;i<this.size;i++){
                    for(let j=0;j<this.size;j++){
                        if(this.grid[i][j]===0) empty.push({i,j});
                    }
                }
                if(!empty.length) return null;
                let pos = empty[Math.floor(Math.random()*empty.length)];
                this.grid[pos.i][pos.j] = Math.random()<0.9 ? 2 : 4;
                return pos;
            }
        }

        class Game {
            constructor() {
                this.size = 4;
                this.board = new Board(this.size);
                this.score = 0;
                this.lastNew = null;
                this.hasWin = false; // 标记是否合成过2048
                this.init();
            }
            init() {
                this.board.addRandom();
                this.board.addRandom();
            }
            move(dir) {
                let g = this.board.getGrid();
                let ng = g.map(r=>[...r]);
                let moved = false;
                let addScore = 0;

                // 左右滑动
                if(dir === 1 || dir === 3) {
                    for(let i=0;i<4;i++){
                        let row = ng[i].filter(x=>x!==0);
                        if(dir === 3){
                            for(let j=0;j<row.length-1;j++){
                                if(row[j]===row[j+1]){
                                    row[j] *= 2;
                                    addScore += row[j];
                                    row[j+1] = 0;
                                }
                            }
                        } else {
                            for(let j=row.length-1;j>0;j--){
                                if(row[j]===row[j-1]){
                                    row[j] *= 2;
                                    addScore += row[j];
                                    row[j-1] = 0;
                                }
                            }
                        }
                        row = row.filter(x=>x!==0);
                        while(row.length<4) dir===1 ? row.unshift(0) : row.push(0);
                        if(ng[i].join('') !== row.join('')) moved = true;
                        ng[i] = row;
                    }
                }
                // 上下滑动
                if(dir === 0 || dir === 2) {
                    for(let j=0;j<4;j++){
                        let col = [];
                        for(let i=0;i<4;i++) col.push(ng[i][j]);
                        if(dir === 0){
                            for(let i=0;i<col.length-1;i++){
                                if(col[i]===col[i+1]){
                                    col[i] *= 2;
                                    addScore += col[i];
                                    col[i+1] = 0;
                                }
                            }
                        } else {
                            for(let i=col.length-1;i>0;i--){
                                if(col[i]===col[i-1]){
                                    col[i] *= 2;
                                    addScore += col[i];
                                    col[i-1] = 0;
                                }
                            }
                        }
                        col = col.filter(x=>x!==0);
                        while(col.length<4) dir===2 ? col.unshift(0) : col.push(0);
                        for(let i=0;i<4;i++){
                            if(ng[i][j] !== col[i]) moved = true;
                            ng[i][j] = col[i];
                        }
                    }
                }

                if(moved){
                    this.board.setGrid(ng);
                    this.score += addScore;
                    this.lastNew = this.board.addRandom();
                    // 检测是否出现2048，标记状态，不弹窗
                    this.checkWin();
                }
                return moved;
            }

            // 检测是否合成2048，仅做标记，继续游戏
            checkWin(){
                let grid = this.board.getGrid();
                for(let i = 0; i < 4; i++){
                    for(let j = 0; j < 4; j++){
                        if(grid[i][j] === 2048){
                            this.hasWin = true;
                            return;
                        }
                    }
                }
            }

            // 游戏结束判断：无空格且无可合并方块
            isOver() {
                let g = this.board.getGrid();
                for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(g[i][j]===0) return false;
                for(let i=0;i<4;i++) for(let j=0;j<3;j++) if(g[i][j]===g[i][j+1]) return false;
                for(let j=0;j<4;j++) for(let i=0;i<3;i++) if(g[i][j]===g[i+1][j]) return false;
                return true;
            }
        }

        // 初始化
        let game = new Game();
        const gridBox = document.getElementById('gridContainer');
        const scoreDom = document.getElementById('score');
        const highScoreDom = document.getElementById('highScore');

        // 初始化最高分，清理脏数据
        let highScore = parseInt(localStorage.getItem('2048_highScore')) || 0;
        highScoreDom.innerText = highScore;

        // 渲染页面
        function render() {
            gridBox.innerHTML = '';
            let g = game.board.getGrid();
            for(let i=0;i<4;i++){
                for(let j=0;j<4;j++){
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    let val = g[i][j];
                    if(val > 0){
                        let img = new Image();
                        img.src = `images/${val}.png`;
                        if(game.lastNew && game.lastNew.i === i && game.lastNew.j === j){
                            cell.classList.add('new');
                        }
                        cell.appendChild(img);
                    }
                    gridBox.appendChild(cell);
                }
            }
            scoreDom.innerText = game.score;
            // 更新最高分
            if(game.score > highScore){
                highScore = game.score;
                localStorage.setItem('2048_highScore', highScore);
                highScoreDom.innerText = highScore;
            }
            // 棋盘走不动，弹出游戏结束
            if(game.isOver()){
                let over = document.createElement('div');
                over.className = 'game-over';
                over.innerHTML = '<p>游戏结束</p>';
                gridBox.appendChild(over);
            }
        }

        // 重新开始游戏
        function restartGame() {
            game = new Game();
            render();
        }

        // 键盘方向键控制
        document.addEventListener('keydown', e=>{
            let d = -1;
            switch(e.key){
                case 'ArrowUp': d=0; break;
                case 'ArrowRight': d=1; break;
                case 'ArrowDown': d=2; break;
                case 'ArrowLeft': d=3; break;
            }
            if(d !== -1 && game.move(d)) render();
        });

        // 触摸滑动控制
        let sx = 0, sy = 0;
        gridBox.addEventListener('touchstart', e=>{
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
        });
        gridBox.addEventListener('touchend', e=>{
            let ex = e.changedTouches[0].clientX;
            let ey = e.changedTouches[0].clientY;
            let dx = ex - sx;
            let dy = ey - sy;
            let dir = -1;

            if(Math.abs(dx) > Math.abs(dy)){
                if(dx > 30) dir = 1;
                else if(dx < -30) dir = 3;
            } else {
                if(dy > 30) dir = 2;
                else if(dy < -30) dir = 0;
            }

            if(dir !== -1 && game.move(dir)){
                render();
            }
        });

        // 首次渲染
        render();
    </script>
</body>
</html>
