<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #faf8ef;
            touch-action: none;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .title {
            font-size: 60px;
            font-weight: bold;
            color: #8b8073;
            margin-bottom: 15px;
        }
        .score-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            gap: 8px;
        }
        .score-box {
            background: #c4b4a3;
            color: #fff;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
        }
        .grid-container {
            width: 100%;
            max-width: 320px;
            height: 320px;
            background: #d9cdbf;
            border-radius: 8px;
            padding: 10px;
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            touch-action: none;
            user-select: none;
        }
        .grid-cell {
            background: #ebe1d6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-drag: none;
        }
        .grid-cell.new img {
            animation: appear 0.1s ease forwards;
        }
        @keyframes appear {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238,228,218,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
        }
        .game-over p {
            font-size: 28px;
            font-weight: bold;
            color: #776e65;
        }
        .restart-btn {
            background: #c4b4a3;
            color: #fff;
            padding: 12px 40px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            border: none;
            cursor: pointer;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="title">2048</div>
    <div class="score-container">
        <div class="score-box">分数: <span id="score">0</span></div>
        <div class="score-box">最高分: <span id="highScore">0</span></div>
    </div>
    <div class="grid-container" id="gridContainer"></div>
    <button class="restart-btn" onclick="restartGame()">重新开始</button>

    <script>
        // 图片预加载缓存，解决空白卡顿
        const imgCache = {};
        const imgList = [2,4,8,16,32,64,128,256,512,1024,2048];
        imgList.forEach(num => {
            const img = new Image();
            img.src = `images/${num}.png`;
            imgCache[num] = img;
        });

        class Board {
            constructor(size) {
                this.size = size;
                this.grid = Array(size).fill().map(()=>Array(size).fill(0));
            }
            getGrid() { return JSON.parse(JSON.stringify(this.grid)); }
            setGrid(g) { this.grid = g; }
            addRandom() {
                let empty = [];
                for(let i=0;i<this.size;i++){
                    for(let j=0;j<this.size;j++){
                        if(this.grid[i][j]===0) empty.push({i,j});
                    }
                }
                if(!empty.length) return null;
                let pos = empty[Math.floor(Math.random()*empty.length)];
                this.grid[pos.i][pos.j] = Math.random()<0.9 ? 2 : 4;
                return pos;
            }
        }

        class Game {
            constructor() {
                this.size = 4;
                this.board = new Board(this.size);
                this.score = 0;
                this.lastNew = null;
                this.init();
            }
            init() {
                this.board.addRandom();
                this.board.addRandom();
            }

            // 处理单行：左/右
            handleRow(row, toLeft) {
                let arr = row.filter(v => v !== 0);
                // 合并
                if(toLeft) {
                    for(let i = 0; i < arr.length - 1; i++) {
                        if(arr[i] === arr[i+1]) {
                            arr[i] *= 2;
                            this.score += arr[i];
                            arr[i+1] = 0;
                            i++;
                        }
                    }
                } else {
                    for(let i = arr.length - 1; i > 0; i--) {
                        if(arr[i] === arr[i-1]) {
                            arr[i] *= 2;
                            this.score += arr[i];
                            arr[i-1] = 0;
                            i--;
                        }
                    }
                }
                // 再次去空值
                arr = arr.filter(v => v !== 0);
                // 补零
                while(arr.length < 4) {
                    toLeft ? arr.push(0) : arr.unshift(0);
                }
                return arr;
            }

            // 处理单列：上/下
            handleCol(col, toTop) {
                let arr = col.filter(v => v !== 0);
                // 合并
                if(toTop) {
                    for(let i = 0; i < arr.length - 1; i++) {
                        if(arr[i] === arr[i+1]) {
                            arr[i] *= 2;
                            this.score += arr[i];
                            arr[i+1] = 0;
                            i++;
                        }
                    }
                } else {
                    for(let i = arr.length - 1; i > 0; i--) {
                        if(arr[i] === arr[i-1]) {
                            arr[i] *= 2;
                            this.score += arr[i];
                            arr[i-1] = 0;
                            i--;
                        }
                    }
                }
                // 再次去空值
                arr = arr.filter(v => v !== 0);
                // 补零
                while(arr.length < 4) {
                    toTop ? arr.push(0) : arr.unshift(0);
                }
                return arr;
            }

            move(dir) {
                let grid = this.board.getGrid();
                let moved = false;

                // 左
                if(dir === 3) {
                    for(let i = 0; i < 4; i++) {
                        let old = [...grid[i]];
                        grid[i] = this.handleRow(grid[i], true);
                        if(old.join('') !== grid[i].join('')) moved = true;
                    }
                }
                // 右
                else if(dir === 1) {
                    for(let i = 0; i < 4; i++) {
                        let old = [...grid[i]];
                        grid[i] = this.handleRow(grid[i], false);
                        if(old.join('') !== grid[i].join('')) moved = true;
                    }
                }
                // 上
                else if(dir === 0) {
                    for(let j = 0; j < 4; j++) {
                        let col = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                        let old = [...col];
                        col = this.handleCol(col, true);
                        if(old.join('') !== col.join('')) moved = true;
                        for(let i = 0; i < 4; i++) grid[i][j] = col[i];
                    }
                }
                // 下
                else if(dir === 2) {
                    for(let j = 0; j < 4; j++) {
                        let col = [grid[0][j], grid[1][j], grid[2][j], grid[3][j]];
                        let old = [...col];
                        col = this.handleCol(col, false);
                        if(old.join('') !== col.join('')) moved = true;
                        for(let i = 0; i < 4; i++) grid[i][j] = col[i];
                    }
                }

                if(moved) {
                    this.board.setGrid(grid);
                    this.lastNew = this.board.addRandom();
                }
                return moved;
            }

            // 游戏结束判断
            isOver() {
                let g = this.board.getGrid();
                for(let i=0;i<4;i++) for(let j=0;j<4;j++) if(g[i][j]===0) return false;
                for(let i=0;i<4;i++) for(let j=0;j<3;j++) if(g[i][j]===g[i][j+1]) return false;
                for(let j=0;j<4;j++) for(let i=0;i<3;i++) if(g[i][j]===g[i+1][j]) return false;
                return true;
            }
        }

        let game = new Game();
        const gridBox = document.getElementById('gridContainer');
        const scoreDom = document.getElementById('score');
        const highScoreDom = document.getElementById('highScore');

        let highScore = parseInt(localStorage.getItem('2048_highScore')) || 0;
        highScoreDom.innerText = highScore;

        function render() {
            gridBox.innerHTML = '';
            let g = game.board.getGrid();
            for(let i=0;i<4;i++){
                for(let j=0;j<4;j++){
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    let val = g[i][j];
                    if(val > 0){
                        let img = imgCache[val].cloneNode(true);
                        if(game.lastNew && game.lastNew.i === i && game.lastNew.j === j){
                            cell.classList.add('new');
                        }
                        cell.appendChild(img);
                    }
                    gridBox.appendChild(cell);
                }
            }
            scoreDom.innerText = game.score;
            if(game.score > highScore){
                highScore = game.score;
                localStorage.setItem('2048_highScore', highScore);
                highScoreDom.innerText = highScore;
            }
            if(game.isOver()){
                let over = document.createElement('div');
                over.className = 'game-over';
                over.innerHTML = '<p>游戏结束</p>';
                gridBox.appendChild(over);
            }
        }

        function restartGame() {
            game = new Game();
            render();
        }

        // 键盘控制
        document.addEventListener('keydown', e=>{
            let d = -1;
            switch(e.key){
                case 'ArrowUp': d=0; break;
                case 'ArrowRight': d=1; break;
                case 'ArrowDown': d=2; break;
                case 'ArrowLeft': d=3; break;
            }
            if(d !== -1 && game.move(d)) render();
        });

        // 触摸控制
        let sx = 0, sy = 0;
        gridBox.addEventListener('touchstart', e=>{
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
        });
        gridBox.addEventListener('touchend', e=>{
            let ex = e.changedTouches[0].clientX;
            let ey = e.changedTouches[0].clientY;
            let dx = ex - sx;
            let dy = ey - sy;
            let dir = -1;

            if(Math.abs(dx) > Math.abs(dy)){
                if(dx > 30) dir = 1;
                else if(dx < -30) dir = 3;
            } else {
                if(dy > 30) dir = 2;
                else if(dy < -30) dir = 0;
            }

            if(dir !== -1 && game.move(dir)){
                render();
            }
        });

        render();
    </script>
</body>
</html>
